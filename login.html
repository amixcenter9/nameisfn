<!DOCTYPE html>
<html>
<head>
<title>Login Terminal</title>
<style>
body{
  background:black;
  color:#00ff9c;
  font-family:monospace;
}
.center{
  text-align:center;
  margin-top:200px;
}
input{
  background:black;
  border:1px solid #00ff9c;
  color:#00ff9c;
  padding:10px;
}
</style>
</head>
<body>

<div class="center">
<h2>Secure Login</h2>
<input type="password" id="pass" placeholder="Enter password">
<br><br>
<button onclick="login()">Enter</button>
<p id="msg"></p>
</div>

<script>
function login(){
  let p = document.getElementById("pass").value;
  if(p == "admin"){
    window.location = "dashboard.html";
  } else {
    document.getElementById("msg").innerText = "Access Denied";
  }
}
</script>

</body>
</html>
