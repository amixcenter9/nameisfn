<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Motivation - Fahmi_N</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        /* Background Grid 3D */
        .grid-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            z-index: 1;
        }

        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            bottom: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(60deg);
            animation: moveGrid 8s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(60px); }
        }

        /* Main Dashboard */
        .dashboard {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }

        #clock {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.6));
            margin-bottom: 10px;
        }

        .message-box {
            text-align: center;
            padding: 20px;
            width: 90%;
            max-width: 1000px;
        }

        .label {
            font-size: 0.9rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 25px;
            opacity: 0.7;
        }

        .quote-text {
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            font-weight: 700;
            line-height: 1.5;
            min-height: 150px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .highlight {
            color: var(--neon-purple);
            text-shadow: 0 0 15px var(--neon-purple);
        }

        /* Brand Styling @Fahmi_N */
        .brand {
            margin-top: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: white;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            opacity: 0.9;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.7; }
            to { transform: scale(1.05); opacity: 1; }
        }

        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #333;
            text-transform: uppercase;
        }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.05);
            position: absolute; top: 0; z-index: 20;
            animation: scan 6s linear infinite;
        }

        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div class="scanline"></div>
    <div class="grid-container"><div class="grid"></div></div>

    <div class="dashboard">
        <div id="clock">00:00:00</div>
        
        <div class="message-box">
            <div class="label">// Core_Motivation_System</div>
            <div class="quote-text" id="quote">System Online...</div>
            <div class="brand">@Fahmi_N</div>
        </div>

        <div class="footer">
            Terminal v3.0 | Status: <span style="color: #0f0;">Connected</span> | Dev: <span style="color: #0f0;">Fahmi</span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const quotes = [
            "Jangan hanya jadi <span class='highlight'>User</span>, jadilah <span class='highlight'>Creator</span> bagi masa depanmu.",
            "Lakukan <span class='highlight'>Debug</span> pada kegagalan, karena sukses butuh iterasi.",
            "Hidupmu adalah <span class='highlight'>Source Code</span> paling berharga, tuliskan dengan bangga.",
            "Jangan biarkan impianmu hanya ada di <span class='highlight'>Localhost</span>. Deploy sekarang!",
            "Hadapi masalah dengan logika <span class='highlight'>Algorithm</span>, selesaikan dengan hati.",
            "Setiap hari adalah <span class='highlight'>Update</span> baru untuk menjadi versi terbaik dirimu.",
            "Koneksi lambat bukan masalah, yang penting jangan pernah <span class='highlight'>Disconnect</span> dari mimpimu.",
            "Berhenti <span class='highlight'>Looping</span> di masa lalu. Saatnya me-render masa depan baru."
        ];

        let index = 0;
        function rotateQuote() {
            const qElement = document.getElementById('quote');
            qElement.style.opacity = "0";
            qElement.style.filter = "blur(10px)";
            
            setTimeout(() => {
                qElement.innerHTML = quotes[index];
                qElement.style.opacity = "1";
                qElement.style.filter = "blur(0)";
                index = (index + 1) % quotes.length;
            }, 800);
        }

        setInterval(rotateQuote, 5000);
        setTimeout(rotateQuote, 1000);
    </script>
</body>
</html>
