<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahmi | Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#00ff9c;
  font-family:'Share Tech Mono', monospace;
  overflow-x:hidden;
}

/* PARTICLES */
#particles-js {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(5px);
}

/* HERO */
.hero {
  text-align:center;
  margin-top:120px;
}

.hero h1 {
  font-size:40px;
  text-shadow:0 0 20px #00ff9c;
}

/* BUTTON */
.btn {
  padding:10px 20px;
  border:1px solid #00ff9c;
  color:#00ff9c;
  text-decoration:none;
  margin:10px;
  display:inline-block;
  transition:0.3s;
}
.btn:hover {
  background:#00ff9c;
  color:black;
  box-shadow:0 0 15px #00ff9c;
}

/* TERMINAL */
.terminal {
  width:80%;
  margin:50px auto;
  background:black;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px #00ff9c;
}

#output {
  height:200px;
  overflow:auto;
}

input {
  width:100%;
  background:black;
  border:none;
  color:#00ff9c;
  font-family:inherit;
  outline:none;
}

/* AI BOX */
.ai-box {
  width:80%;
  margin:30px auto;
  background:rgba(0,0,0,0.5);
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 15px #00ff9c;
}

footer {
  text-align:center;
  padding:30px;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<nav>
  <div>⚡ FAHMI DEV</div>
  <div>Tools Interface</div>
</nav>

<div class="hero">
  <h1>Access Developer System</h1>
  <a class="btn" href="#">Enter System</a>
  <a class="btn" href="#">GitHub</a>
</div>

<!-- TERMINAL -->
<div class="terminal">
  <div id="output">Type "help" to see commands</div>
  <input id="command" placeholder="Enter command...">
</div>

<!-- AI TOOLS -->
<div class="ai-box">
  <h3>AI Tools</h3>
  <input id="aiInput" placeholder="Ask something...">
  <button onclick="askAI()">Send</button>
  <p id="aiOutput"></p>
</div>

<footer>
  © 2026 Fahmi Dev System
</footer>

<audio id="audio" src="music.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
// PARTICLES
particlesJS("particles-js", {
  particles: {
    number: { value: 70 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true }
  }
});

// TERMINAL
const input = document.getElementById("command");
const output = document.getElementById("output");

input.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    let cmd = input.value;
    output.innerHTML += "<br>> " + cmd;

    if(cmd == "help"){
      output.innerHTML += "<br>Commands: help, about, github, clear";
    }
    else if(cmd == "about"){
      output.innerHTML += "<br>Amix Developer Tools System";
    }
    else if(cmd == "github"){
      output.innerHTML += "<br>Opening GitHub...";
      window.open("https://github.com/");
    }
    else if(cmd == "clear"){
      output.innerHTML = "";
    }
    else{
      output.innerHTML += "<br>Command not found";
    }

    input.value = "";
    output.scrollTop = output.scrollHeight;
  }
});

// FAKE AI
function askAI(){
  let text = document.getElementById("aiInput").value;
  let reply = "AI Response: " + text + " processed.";
  document.getElementById("aiOutput").innerText = reply;
}

// MUSIC AUTOPLAY
const audio = document.getElementById("audio");
window.onload = () => {
  audio.volume = 0.3;
  audio.play().catch(()=>{});
};
</script>

</body>
</html>
