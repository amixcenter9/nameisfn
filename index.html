<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amix Dev - Next Level Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  transition: 0.3s;
}

.dark {
  background: #0a0a0a;
  color: white;
}

.light {
  background: #f5f5f5;
  color: #111;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  backdrop-filter: blur(10px);
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* NEON TEXT */
.neon {
  font-size: 3rem;
  color: #00f7ff;
  text-shadow: 0 0 10px #00f7ff,
               0 0 20px #00f7ff,
               0 0 40px #00f7ff;
}

/* BUTTON */
.btn {
  padding: 12px 25px;
  margin-top: 20px;
  border-radius: 30px;
  background: #00f7ff;
  color: black;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* PARALLAX */
.parallax {
  background-image: url('https://picsum.photos/1920/1080');
  height: 300px;
  background-attachment: fixed;
  background-size: cover;
}

/* GLASS CARD */
.card {
  margin: 40px auto;
  width: 300px;
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  text-align: center;
}

/* AUDIO PLAYER */
.player {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,255,255,0.05);
  border-radius: 20px;
  padding: 15px 25px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px #00f7ff;
}

.player button {
  padding: 8px 15px;
  margin: 5px;
  border: none;
  border-radius: 20px;
  background: #00f7ff;
  cursor: pointer;
  box-shadow: 0 0 10px #00f7ff;
}

canvas {
  display: block;
  margin: 10px auto;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body class="dark">

<nav>
  <h3>Amix Dev</h3>
  <div onclick="toggleMode()" style="cursor:pointer">🌙 / ☀️</div>
</nav>

<section class="hero">
  <h1 class="neon">Build Something Amazing</h1>
  <p id="quote">Loading quote...</p>
  <a href="#" class="btn">🚀 Get Started</a>
</section>

<div class="parallax"></div>

<div class="card">
  <h3>👀 Visitors</h3>
  <p id="visitor">Loading...</p>
</div>

<!-- AUDIO PLAYER -->
<div class="player">
  <canvas id="visualizer" width="300" height="80"></canvas>
  <button onclick="togglePlay()">▶️ / ⏸️</button>
  <input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">
</div>

<audio id="audio" src="music.mp3" loop></audio>

<footer>
  <p>© 2026 Amix Center</p>
</footer>

<script>
// DARK MODE
function toggleMode() {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

// VISITOR COUNTER
fetch("https://api.countapi.xyz/hit/amixdev/github")
.then(res => res.json())
.then(data => {
  document.getElementById("visitor").innerText = data.value + " views";
});

// RANDOM QUOTE API
fetch("https://api.quotable.io/random")
.then(res => res.json())
.then(data => {
  document.getElementById("quote").innerText = data.content;
});

// AUDIO
const audio = document.getElementById("audio");

window.onload = () => {
  audio.volume = 0.4;
  audio.play().catch(()=>{});
};

function togglePlay() {
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
}

function setVolume(val){
  audio.volume = val;
}

// VISUALIZER
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioCtx.createAnalyser();
const source = audioCtx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 64;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

function draw(){
  requestAnimationFrame(draw);
  analyser.getByteFrequencyData(dataArray);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let barWidth = (canvas.width / bufferLength);
  let x = 0;

  for(let i=0;i<bufferLength;i++){
    let barHeight = dataArray[i];
    ctx.fillStyle = "#00f7ff";
    ctx.fillRect(x, canvas.height - barHeight/2, barWidth - 2, barHeight/2);
    x += barWidth;
  }
}

draw();
</script>

</body>
</html>
