<!DOCTYPE html>
<html>
<head>
<title>System Boot</title>
<style>
body{
  background:black;
  color:#00ff9c;
  font-family:monospace;
  padding:20px;
}
</style>
</head>
<body>

<div id="boot"></div>

<script>
const text = [
"Booting system...",
"Loading modules...",
"Accessing secure server...",
"Decrypting data...",
"Initializing interface...",
"Welcome Fahmi Dev",
"Redirecting to login..."
];

let i = 0;
function boot(){
  if(i < text.length){
    document.getElementById("boot").innerHTML += text[i] + "<br>";
    i++;
    setTimeout(boot, 800);
  } else {
    window.location = "login.html";
  }
}
boot();
</script>

</body>
</html>
