<!DOCTYPE html>
<html>
<head>
<title>AI Chat</title>
<style>
body{
  background:black;
  color:#00ff9c;
  font-family:monospace;
}
</style>
</head>
<body>

<h2>AI Chat</h2>

<input id="msg">
<button onclick="chat()">Send</button>

<p id="reply"></p>

<script>
function chat(){
  let text = document.getElementById("msg").value;
  document.getElementById("reply").innerText = "AI: " + text;
}
</script>

</body>
</html>
